paths:
  project_root: ..
  data_dir: ../data
  processed_dir: ../processed
  indexes_dir: ../indexes
  runs_dir: ../runs
  query_set_path: ../data/eval_set.json
  model_cache_dir: ../models

runtime:
  device: cpu
  random_seed: 13
  deterministic_torch: true
  offline: true
  log_level: INFO
  corpus_name: public-sector-pdf-retrieval
  dataset_version: v1

ocr:
  enabled: true
  min_chars_before_fallback: 80
  min_alpha_ratio: 0.30
  min_digit_ratio: 0.60

chunking:
  chunk_size_tokens: 224
  chunk_overlap_tokens: 56
  min_chunk_words: 20

embedding:
  model_name: sentence-transformers/all-MiniLM-L6-v2
  apply_l2_normalization: true
  batch_size: 32
  expected_dimension: 384

faiss:
  index_type: IndexFlatIP

bm25:
  k1: 1.5
  b: 0.75

retrieval:
  dense_top_k: 20
  sparse_top_k: 20
  hybrid_top_k: 20
  rrf_k: 20
  dense_weight: 0.5
  sparse_weight: 2.0

evaluation:
  ks: [1, 3, 5, 10]
